<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Veolia Chaingy</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; }

    .header {
      background: linear-gradient(135deg, #003B5C, #005F8E);
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .veolia-logo {
      color: white;
      font-size: 1.4em;
      font-weight: bold;
      letter-spacing: 2px;
      border: 2px solid white;
      padding: 4px 10px;
      border-radius: 4px;
    }
    .header-text h2 { font-size: 1.1em; margin-bottom: 4px; }
    .header-text p { font-size: 0.8em; color: rgba(255,255,255,0.7); }

    .toolbar {
      background: #f5f5f5;
      padding: 10px 12px;
      border-bottom: 2px solid #003B5C;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-geolocate {
      padding: 10px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85em;
    }
    .btn-geolocate:hover { background: #388E3C; }
    .btn-geolocate:disabled { background: #aaa; cursor: not-allowed; }

    .btn-satellite {
      padding: 10px 16px;
      background: #003B5C;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85em;
    }
    .btn-satellite:hover { background: #005F8E; }

    #map { width: 100%; height: 500px; }

    .status {
      text-align: center;
      padding: 8px;
      font-size: 0.8em;
      color: #666;
      background: white;
      border-top: 1px solid #ddd;
      min-height: 32px;
    }

    .legend {
      padding: 8px 12px;
      background: #fff;
      border-top: 1px solid #ddd;
      font-size: 0.75em;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .footer {
      background: #003B5C;
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 8px;
      font-size: 0.72em;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="veolia-logo">VEOLIA</div>
    <div class="header-text">
      <h2>Plan du site - Chaingy</h2>
      <p>Geolocalisation en temps reel</p>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn-geolocate" id="btn-geo" onclick="geolocateUser()">
      📍 Me géolocaliser
    </button>
    <button class="btn-satellite" onclick="toggleSatellite()">
      🛰️ Vue satellite
    </button>
    <span style="font-size:0.8em; color:#666;">
      Cliquez sur Me géolocaliser pour afficher votre position
    </span>
  </div>

  <div id="map"></div>

  <div class="status" id="status">
    Carte chargée. Cliquez sur "Me géolocaliser".
  </div>

  <div class="legend">
    <div class="legend-item">
      <span class="legend-dot" style="background:#00AEEF"></span> Itinéraire interne
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background:#4CAF50"></span> Votre position
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background:#E53935"></span> Points clés
    </div>
  </div>

  <div class="footer">2024 Veolia - Chaingy</div>

  <script>
    var map = L.map('map', {
      center: [47.881867, 1.802000],
      zoom: 17
    });

    var osmLayer = L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      { attribution: '© OpenStreetMap', maxZoom: 21 }
    );

    var satelliteLayer = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { attribution: '© Esri', maxZoom: 21 }
    );

    satelliteLayer.addTo(map);
    var isSatellite = true;

    // Chargement KML
    var kmlUrl = 'https://drive.google.com/uc?export=download&id=15hGOXtvZWbZ2TPPMbs3IkNr_PIHurzOX';

    var kmlLayer = omnivore.kml(kmlUrl)
      .on('ready', function() {
        this.eachLayer(function(layer) {
          if (layer.setStyle) {
            layer.setStyle({ color: '#00AEEF', weight: 5, opacity: 0.9 });
          }
        });
        map.fitBounds(this.getBounds());
        document.getElementById('status').innerHTML =
          '✅ Itinéraire chargé ! Cliquez sur "Me géolocaliser".';
      })
      .on('error', function() {
        showManualPoints();
        document.getElementById('status').innerHTML =
          '⚠️ KML non chargé - Affichage des points manuels.';
      })
      .addTo(map);

    function showManualPoints() {
      var points = [
        { lat: 47.881577, lng: 1.798691, label: 'A', title: 'Point 1 - Depart', color: '#003B5C' },
        { lat: 47.880913, lng: 1.799122, label: 'B', title: 'Point 2', color: '#00AEEF' },
        { lat: 47.881016, lng: 1.799530, label: 'C', title: 'Point 3', color: '#00AEEF' },
        { lat: 47.881280, lng: 1.799361, label: 'D', title: 'Point 4', color: '#00AEEF' },
        { lat: 47.881360, lng: 1.799541, label: 'E', title: 'Point 5 - Destination', color: '#E53935' }
      ];

      var latlngs = [];
      points.forEach(function(p) {
        latlngs.push([p.lat, p.lng]);
        var icon = L.divIcon({
          html: '<div style="background:' + p.color + ';color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;border:2px solid white;">' + p.label + '</div>',
          iconSize: [28, 28], iconAnchor: [14, 14]
        });
        L.marker([p.lat, p.lng], { icon: icon })
          .bindPopup('<strong>' + p.title + '</strong>').addTo(map);
      });

      L.polyline(latlngs, { color: '#00AEEF', weight: 5, opacity: 0.9 }).addTo(map);
      map.fitBounds(latlngs);
    }

    // Marqueur entreprise
    var entrepriseIcon = L.divIcon({
      html: '<div style="background:#E53935;color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid white;">🏭</div>',
      iconSize: [32, 32], iconAnchor: [16, 16]
    });
    L.marker([47.881867, 1.802000], { icon: entrepriseIcon })
      .bindPopup('<strong>Veolia Chaingy</strong><br>Entrée principale').addTo(map);

    // Géolocalisation
    var userMarker = null;
    var userCircle = null;
    var watchId = null;

    function geolocateUser() {
      var btn = document.getElementById('btn-geo');
      var statusEl = document.getElementById('status');

      if (!navigator.geolocation) {
        statusEl.innerHTML = '❌ Géolocalisation non supportée.';
        return;
      }

      btn.disabled = true;
      btn.textContent = '📡 Localisation...';
      statusEl.innerHTML = '📡 Récupération de votre position GPS...';

      if (watchId) navigator.geolocation.clearWatch(watchId);

      watchId = navigator.geolocation.watchPosition(
        function(position) {
          var lat = position.coords.latitude;
          var lng = position.coords.longitude;
          var accuracy = Math.round(position.coords.accuracy);

          if (userMarker) { map.removeLayer(userMarker); map.removeLayer(userCircle); }

          var userIcon = L.divIcon({
            html: '<div style="background:#4CAF50;width:20px;height:20px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 3px rgba(76,175,80,0.4)"></div>',
            iconSize: [20, 20], iconAnchor: [10, 10]
          });

          userMarker = L.marker([lat, lng], { icon: userIcon })
            .bindPopup('<strong>📍 Vous êtes ici</strong><br>Précision : ~' + accuracy + 'm')
            .addTo(map);

          userCircle = L.circle([lat, lng], {
            radius: accuracy, color: '#4CAF50',
            fillColor: '#4CAF50', fillOpacity: 0.1, weight: 1
          }).addTo(map);

          var dist = calculerDistance(lat, lng, 47.881867, 1.802000);
          statusEl.innerHTML = '✅ Position trouvée ! Précision : ~' + accuracy + 'm | Distance entrée : <strong>' + dist + '</strong>';

          btn.disabled = false;
          btn.textContent = '📍 Me géolocaliser';
          map.setView([lat, lng], 18);
        },
        function(error) {
          btn.disabled = false;
          btn.textContent = '📍 Me géolocaliser';
          statusEl.innerHTML = '❌ Erreur de géolocalisation : ' + error.message;
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    function toggleSatellite() {
      if (isSatellite) {
        map.removeLayer(satelliteLayer);
        osmLayer.addTo(map);
        isSatellite = false;
        document.querySelector('.btn-satellite').textContent = '🗺️ Vue plan';
      } else {
        map.removeLayer(osmLayer);
        satelliteLayer.addTo(map);
        isSatellite = true;
        document.querySelector('.btn-satellite').textContent = '🛰️ Vue satellite';
      }
    }

    function calculerDistance(lat1, lng1, lat2, lng2) {
      var R = 6371000;
      var dLat = (lat2 - lat1) * Math.PI / 180;
      var dLng = (lng2 - lng1) * Math.PI / 180;
      var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
      var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      var d = R * c;
      return d < 1000 ? Math.round(d) + ' m' : (d/1000).toFixed(1) + ' km';
    }
  </script>
</body>
</html>
